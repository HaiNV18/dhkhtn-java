<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>OpenAI</title>
</head>
<body>
<h3>Phép tính</h3>

<p>Giá trị a: <span th:text="${a}"></span></p>
<p>Giá trị b: <span th:text="${b}"></span></p>

<p>a + b = <span th:text="${sum}"></span></p>
<p>a - b = <span th:text="${sub}"></span></p>
</body>
</html>
